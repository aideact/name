<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Enter password</title>
<style>
  body { font-family: Arial; text-align: center; padding-top: 100px; }
  input { padding: 10px; font-size: 16px; }
  button { padding: 10px 20px; font-size: 16px; margin-left: 10px; cursor: pointer; }
</style>
</head>
<body>

<h2>Enter password；888</h2>
<input type="password" id="pwd" placeholder="@_@">
<button onclick="checkPassword()">Enter</button>
<p id="msg" style="color:red;"></p>

<script>
function checkPassword() {
  var password = document.getElementById("pwd").value;
  var msg = document.getElementById("msg");
  var correct = "888"; // 
  if(password === correct){
    window.location.href = "https://sites.google.com/view/aideact/%E9%A6%96%E9%A1%B5"; // 
  } else {
    msg.textContent = "Wrong Password,pls Enter the correct password";
    document.getElementById("pwd").value = "";
  }
}
</script>

</body>

</html>
